<!DOCTYPE html>
<html>

<head>
<title>IPL Score Predictor</title>
<link rel="stylesheet" href="/static/style.css">
</head>


<body>

<div class="box">

<h1>IPL First Innings Score Predictor</h1>


<form action="/predict" method="POST">


<label>Batting Team</label>

<select name="batting_team">

{% for team in teams %}

<option>{{team}}</option>

{% endfor %}

</select>



<label>Bowling Team</label>

<select name="bowling_team">

{% for team in teams %}

<option>{{team}}</option>

{% endfor %}

</select>




<label>City</label>

<select name="city">

{% for city in cities %}

<option>{{city}}</option>

{% endfor %}

</select>



<label>Current Score</label>

<input type="number" name="curr_run" required>


<label>Current Balls</label>

<input type="number" name="balls" required>


<label>Current Wickets</label>

<input type="number" name="wicket" required>


<button type="submit">
Predict
</button>


</form>

</div>


</body>
  </html>
