<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predicted Score — IPL Score Predictor</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="grid-overlay"></div>

<div class="box result-box">

  <span class="live-badge"><span class="live-dot"></span> Prediction Ready</span>

  <h1>Predicted Final Score</h1>
  <p class="subtitle">Based on current run rate, wickets, and venue.</p>

  <div class="scoreboard">
    <div class="score-label">Projected Range</div>
    <h2 class="score">{{ score }}</h2>
    <div class="score-sub">runs at the end of 20 overs</div>
  </div>

  <a href="/" class="again-link">
    Predict Again
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v6h-6"/></svg>
  </a>

</div>

</body>
</html>
